<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHASE: GLOW UP</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050a14;
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.3);
            --panel: rgba(13, 25, 48, 0.7);
            --border: #1a3a5a;
            --text: #e0f2fe;
            --text-dim: #709ab0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 2px 2px, var(--border) 1px, transparent 0);
            background-size: 40px 40px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        /* SVG Background Element */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.4; pointer-events: none;
        }

        /* Login Screen */
        #login-screen {
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }

        .card {
            background: var(--panel);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            width: 100%; max-width: 400px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        h1 { font-family: 'Orbitron', sans-serif; letter-spacing: 4px; color: var(--accent); margin-bottom: 20px; }
        
        input {
            width: 100%; padding: 12px; background: #000; border: 1px solid var(--border);
            color: var(--accent); border-radius: 4px; margin-bottom: 20px; outline: none;
        }

        button {
            background: var(--accent); color: #000; border: none; padding: 12px 24px;
            font-family: 'Orbitron', sans-serif; font-weight: bold; cursor: pointer;
            border-radius: 4px; transition: 0.3s;
        }
        button:hover { box-shadow: 0 0 15px var(--accent); transform: translateY(-2px); }

        /* Main App */
        #app { display: none; padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
        
        .stats {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }

        .stat-box {
            background: var(--panel); border-left: 4px solid var(--accent);
            padding: 20px; border-radius: 4px;
        }

        .gallery {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .photo-card {
            background: var(--panel); border: 1px solid var(--border);
            border-radius: 8px; overflow: hidden; transition: 0.3s;
        }
        .photo-card:hover { border-color: var(--accent); }
        .photo-card img { width: 100%; height: 300px; object-fit: cover; }
        .photo-meta { padding: 15px; font-size: 0.9rem; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<svg class="bg-glow" viewBox="0 0 1000 1000" preserveAspectRatio="none">
    <circle cx="500" cy="0" r="400" fill="url(#grad1)" />
    <defs>
        <radialGradient id="grad1" cx="50%" cy="50%" r="50%">
            <stop offset="0%" style="stop-color:var(--accent);stop-opacity:0.2" />
            <stop offset="100%" style="stop-color:var(--bg);stop-opacity:0" />
        </radialGradient>
    </defs>
</svg>

<div id="login-screen">
    <div class="card">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--accent); margin-bottom: 10px;">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        <h1>RESTRICTED</h1>
        <input type="password" id="pass" placeholder="ACCESS KEY">
        <button onclick="unlock()">INITIALIZE</button>
    </div>
</div>

<div id="app">
    <h1>PHASE: PROGRESS</h1>
    <div class="stats">
        <div class="stat-box">
            <div style="color: var(--text-dim); font-size: 0.8rem; letter-spacing: 1px;">HAIR GROWTH</div>
            <div id="day-count" style="font-size: 2rem; font-family: 'Orbitron';">DAY 1</div>
        </div>
        <div class="stat-box">
            <div style="color: var(--text-dim); font-size: 0.8rem; letter-spacing: 1px;">FACE DEFICIT</div>
            <div style="font-size: 2rem; font-family: 'Orbitron'; text-shadow: 0 0 10px var(--accent-glow);">ACTIVE</div>
        </div>
    </div>

    <div class="gallery" id="gallery">
        </div>
</div>

<script>
    const KEY = "glowup2026";
    
    // In a real scenario, this 'data' array would be updated by your Discord Bot 
    // and pushed to this file via GitHub API.
    const progressData = [
        { date: "2026-03-25", img: "https://via.placeholder.com/400x500/0d1930/00d4ff?text=Day+1", note: "Starting the journey." }
    ];

    function unlock() {
        if(document.getElementById('pass').value === KEY) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').style.display = 'block';
            render();
        }
    }

    function render() {
        const container = document.getElementById('gallery');
        container.innerHTML = progressData.map(item => `
            <div class="photo-card">
                <img src="${item.img}" alt="Progress">
                <div class="photo-meta">
                    <span style="color:var(--accent)">${item.date}</span><br>
                    <p style="margin-top:5px; color:var(--text-dim)">${item.note}</p>
                </div>
            </div>
        `).join('');
        document.getElementById('day-count').innerText = "DAY " + progressData.length;
    }
</script>
</body>
</html>
